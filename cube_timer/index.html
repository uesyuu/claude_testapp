<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cube Timer</title>
  <script src="min2phase.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    /* スクランブルブロック: 画面上部、縦は狭め */
    #scramble-block {
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      text-align: center;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scramble-text {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #e94560;
      word-break: break-all;
    }

    /* 下部: タイマー(左) + タイムリスト(右) */
    #bottom {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* タイマーブロック: 画面下部の左側 */
    #timer-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.1s;
      padding: 20px;
    }

    #timer-block:active,
    #timer-block.pressed {
      background: rgba(233, 69, 96, 0.08);
    }

    #timer-display {
      font-size: 5rem;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      color: #e0e0e0;
      letter-spacing: -0.02em;
      transition: color 0.1s;
    }

    #timer-display.running {
      color: #4fc3f7;
    }

    #timer-hint {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #555;
    }

    /* タイムリストブロック: 画面下部の右側、横は狭め */
    #times-block {
      width: 220px;
      border-left: 1px solid #0f3460;
      background: #16213e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #times-header {
      padding: 12px 16px;
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    #times-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #times-list::-webkit-scrollbar {
      width: 4px;
    }

    #times-list::-webkit-scrollbar-track {
      background: #16213e;
    }

    #times-list::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 2px;
    }

    .time-entry {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
      border-bottom: 1px solid rgba(15, 52, 96, 0.4);
    }

    .time-entry:last-child {
      border-bottom: none;
    }

    .time-index {
      color: #555;
      font-size: 0.75rem;
      width: 28px;
      flex-shrink: 0;
    }

    .time-value {
      color: #e0e0e0;
    }

    .time-entry.latest .time-value {
      color: #e94560;
      font-weight: 600;
    }

    #times-footer {
      padding: 10px 16px;
      border-top: 1px solid #0f3460;
      font-size: 0.8rem;
      color: #666;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      #timer-display {
        font-size: 3.5rem;
      }

      #times-block {
        width: 160px;
      }

      #scramble-text {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- スクランブルブロック -->
  <div id="scramble-block">
    <div id="scramble-text">読み込み中...</div>
  </div>

  <!-- 下部エリア -->
  <div id="bottom">

    <!-- タイマーブロック -->
    <div id="timer-block">
      <div id="timer-display">0.00</div>
      <div id="timer-hint">スペースキー / タップ で開始</div>
    </div>

    <!-- タイムリストブロック -->
    <div id="times-block">
      <div id="times-header">タイム一覧</div>
      <div id="times-list"></div>
      <div id="times-footer" id="times-count"></div>
    </div>

  </div>

  <script>
    // --- 状態管理 ---
    let isRunning = false;
    let startTime = 0;
    let elapsed = 0; // ms
    let rafId = null;
    let times = [];

    const timerDisplay = document.getElementById('timer-display');
    const timerBlock = document.getElementById('timer-block');
    const scrambleText = document.getElementById('scramble-text');
    const timesList = document.getElementById('times-list');
    const timesFooter = document.getElementById('times-footer');

    // --- min2phase 初期化 ---
    function generateScramble() {
      try {
        const cube = min2phase.randomCube();
        const solution = min2phase.solve(cube);
        return solution.trim();
      } catch (e) {
        return 'R U R\' U\'';
      }
    }

    function updateScramble() {
      scrambleText.textContent = generateScramble();
    }

    // --- 時間フォーマット ---
    // hh:mm:ss.mm (hour/minuteは0なら省略)
    function formatTime(ms) {
      const totalCs = Math.floor(ms / 10); // centiseconds
      const cs = totalCs % 100;
      const totalSec = Math.floor(totalCs / 100);
      const sec = totalSec % 60;
      const totalMin = Math.floor(totalSec / 60);
      const min = totalMin % 60;
      const hour = Math.floor(totalMin / 60);

      const csStr = String(cs).padStart(2, '0');
      const secStr = String(sec).padStart(2, '0');
      const minStr = String(min).padStart(2, '0');

      if (hour > 0) {
        return `${hour}:${minStr}:${secStr}.${csStr}`;
      } else if (min > 0) {
        return `${min}:${secStr}.${csStr}`;
      } else {
        return `${sec}.${csStr}`;
      }
    }

    // --- タイマー制御 ---
    function startTimer() {
      isRunning = true;
      timerDisplay.textContent = formatTime(0);
      startTime = performance.now() - elapsed;
      timerDisplay.classList.add('running');
      timerBlock.querySelector('#timer-hint').textContent = 'スペースキー / タップ で停止';

      function tick() {
        elapsed = performance.now() - startTime;
        timerDisplay.textContent = formatTime(elapsed);
        rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);
    }

    function stopTimer() {
      isRunning = false;
      cancelAnimationFrame(rafId);
      timerDisplay.classList.remove('running');
      timerBlock.querySelector('#timer-hint').textContent = 'スペースキー / タップ で開始';

      const finalTime = elapsed;
      addTime(finalTime);
      elapsed = 0;
      updateScramble();
    }

    function toggleTimer() {
      if (isRunning) {
        stopTimer();
      } else {
        startTimer();
      }
    }

    // --- タイムリスト ---
    function addTime(ms) {
      times.unshift(ms); // 新しい順に追加
      renderTimes();
    }

    function renderTimes() {
      timesList.innerHTML = '';
      times.forEach((t, i) => {
        const entry = document.createElement('div');
        entry.className = 'time-entry' + (i === 0 ? ' latest' : '');

        const indexEl = document.createElement('span');
        indexEl.className = 'time-index';
        indexEl.textContent = `${times.length - i}.`;

        const valueEl = document.createElement('span');
        valueEl.className = 'time-value';
        valueEl.textContent = formatTime(t);

        entry.appendChild(indexEl);
        entry.appendChild(valueEl);
        timesList.appendChild(entry);
      });

      timesFooter.textContent = times.length > 0
        ? `${times.length} 回`
        : '';
    }

    // --- イベント ---
    // スペースキー
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        toggleTimer();
      }
    });

    // タイマーブロックのタップ (スマホのみ)
    timerBlock.addEventListener('touchstart', () => {
      timerBlock.classList.add('pressed');
    }, { passive: true });
    timerBlock.addEventListener('touchend', (e) => {
      e.preventDefault(); // clickイベントの二重発火を防ぐ
      timerBlock.classList.remove('pressed');
      toggleTimer();
    });

    // --- 初期化 ---
    window.addEventListener('load', () => {
      // min2phase の初期化（バックグラウンドで行う）
      setTimeout(() => {
        min2phase.initFull();
        updateScramble();
      }, 100);
    });
  </script>

</body>
</html>
